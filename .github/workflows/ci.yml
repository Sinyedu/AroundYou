name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, development]

defaults:
  run:
    working-directory: frontend/around-you

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/around-you/package-lock.json

      - run: npm ci

      - name: 🔍 Type check
        run: npm run type-check

      - name: 🧹 Lint
        run: npm run lint

      - name: 🧪 Run tests
        run: npm run test

      - name: 📊 Coverage (PR only)
        if: github.event_name == 'pull_request'
        run: npm run test:coverage

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/around-you/package-lock.json

      - run: npm ci

      - name: 🏗️ Build project
        run: npm run build
