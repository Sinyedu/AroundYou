name: CI

on:
  pull_request:
    branches: [main, development]

defaults:
  run:
    working-directory: frontend/around-you

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/around-you/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      # - name: Lint
      #   run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Coverage (PR only)
        if: github.event_name == 'pull_request'
        run: npm run test:coverage

      - name: Build project
        run: npm run build
